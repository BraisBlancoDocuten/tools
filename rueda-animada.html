<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rueda animada</title>
<style>
  html,body{height:100%;margin:0}
  body{display:flex;align-items:center;justify-content:center;background:#ffffff}
  .logo{width:min(90vw,420px);height:auto}
  #wheel{animation:bob 0.9s ease-in-out infinite;transform-origin:340px 200px}
  #spokes{animation:spin 1.1s linear infinite;transform-origin:340px 90px}
  .speed{animation:whoosh 0.5s linear infinite}
  .speed.b{animation-delay:0.16s}
  .speed.c{animation-delay:0.32s}
  .rw{animation:roadwind 1s linear infinite}
  .rw.b{animation-delay:0.33s}
  .rw.c{animation-delay:0.66s}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @keyframes whoosh{0%{transform:translateX(0);opacity:0}20%{opacity:.7}100%{transform:translateX(-70px);opacity:0}}
  @keyframes roadwind{0%{transform:translateX(0);opacity:0}25%{opacity:.55}100%{transform:translateX(-150px);opacity:0}}
</style>
</head>
<body>
<svg class="logo" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Logo rueda animada girando sobre carretera</title>
<desc>Semicírculo azul con hueco alrededor del medio círculo amarillo, línea discontinua girando en sentido horario y estelas de viento sobre la carretera.</desc>
<defs>
<clipPath id="wheelclip"><path d="M210 90 A130 130 0 0 0 470 90 Z"/></clipPath>
<clipPath id="roadclip"><rect x="210" y="258" width="260" height="62" rx="4"/></clipPath>
<mask id="notch">
<rect x="200" y="80" width="280" height="160" fill="#fff"/>
<circle cx="340" cy="90" r="48" fill="#000"/>
</mask>
</defs>

<line class="speed" x1="205" y1="150" x2="255" y2="150" stroke="#4C7FF7" stroke-width="7" stroke-linecap="round"/>
<line class="speed b" x1="195" y1="190" x2="250" y2="190" stroke="#4C7FF7" stroke-width="7" stroke-linecap="round"/>
<line class="speed c" x1="205" y1="230" x2="255" y2="230" stroke="#4C7FF7" stroke-width="7" stroke-linecap="round"/>

<g id="wheel">
<g mask="url(#notch)">
<path d="M210 90 A130 130 0 0 0 470 90 Z" fill="#4C7FF7"/>
<g clip-path="url(#wheelclip)">
<g id="spokes" fill="none" stroke="#6E9BF5" stroke-width="7" stroke-linecap="round">
<circle cx="340" cy="90" r="100" stroke-dasharray="10 46 28 70 6 44"/>
</g>
</g>
</g>
<path d="M315 90 A25 25 0 0 0 365 90 Z" fill="#FBBF24"/>
</g>

<rect x="210" y="258" width="260" height="62" rx="4" fill="#4C7FF7"/>
<g clip-path="url(#roadclip)">
<line class="rw" x1="430" y1="276" x2="480" y2="276" stroke="#B5D4F4" stroke-width="5" stroke-linecap="round"/>
<line class="rw b" x1="440" y1="290" x2="490" y2="290" stroke="#B5D4F4" stroke-width="5" stroke-linecap="round"/>
<line class="rw c" x1="430" y1="304" x2="480" y2="304" stroke="#B5D4F4" stroke-width="5" stroke-linecap="round"/>
</g>
</svg>
</body>
</html>
